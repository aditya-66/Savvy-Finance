<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVVY - Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
    <div class="auth-container fade-in">
        <a href="index.html" class="auth-logo-wrapper" style="text-decoration: none;">
            <img src="logo.svg" alt="SAVVY" style="height: 40px; filter: drop-shadow(0 0 10px rgba(0,229,255,0.6));">
            <h1>SAVVY</h1>
        </a>
        
        <div class="auth-wrapper">
            <!-- Floating Icons -->
            <i class="fa-solid fa-shield-halved floating-icon float-1"></i>
            <i class="fa-solid fa-power-off floating-icon float-5"></i>
            <i class="fa-brands fa-bitcoin floating-icon float-2"></i>
            <i class="fa-solid fa-fingerprint floating-icon float-3"></i>
            <i class="fa-solid fa-key floating-icon float-4"></i>

            <div class="auth-card">
                <h2>WELCOME BACK</h2>
                <p class="auth-subtitle">Log in to manage your financial future.</p>
                <form id="login-form" class="auth-form">
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <div class="auth-input-wrapper input-email">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="email" placeholder="" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="auth-input-wrapper input-password">
                            <i class="fa-solid fa-key"></i>
                            <input type="password" id="password" placeholder="" required>
                        </div>
                    </div>
                    <div class="auth-actions">
                        <label class="remember-me">
                            <input type="checkbox"> Remember Me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                    <button type="submit" class="auth-submit-btn">
                        <i class="fa-solid fa-key"></i> SIGN IN
                    </button>
                </form>
                <p class="auth-footer">Don't have an account? <a href="register.html">Register here.</a></p>
            </div>
        </div>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
